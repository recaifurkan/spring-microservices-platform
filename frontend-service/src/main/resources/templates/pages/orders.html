<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{orders.title}">My Orders – ShopMicro</title>
</head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <div class="page-header" style="margin:0">
                <h2 th:text="#{orders.heading}">📦 My Orders</h2>
                <p th:text="#{orders.subtitle}">You can view all your orders below.</p>
            </div>
            <a th:href="@{/products}" class="btn btn-primary btn-sm"
               th:text="#{orders.goToProducts}">🛍️ Go to Products</a>
        </div>

        <th:block th:replace="~{fragments/alerts :: error(${data.error})}"></th:block>
        <th:block th:replace="~{fragments/alerts :: success(${data.success})}"></th:block>

        <div class="empty-state" th:if="${data.orders.empty}">
            <p th:text="#{orders.empty}">You have no orders yet.</p>
            <a th:href="@{/products}" class="btn btn-primary" th:text="#{orders.browse}">🛍️ Browse Products</a>
        </div>

        <div class="table-wrapper" th:unless="${data.orders.empty}">
            <table>
                <thead>
                    <tr>
                        <th th:text="#{orders.col.order}">#Order</th>
                        <th th:text="#{orders.col.product}">Product</th>
                        <th th:text="#{orders.col.qty}">Qty</th>
                        <th th:text="#{orders.col.total}">Total</th>
                        <th th:text="#{orders.col.status}">Status</th>
                        <th th:text="#{orders.col.date}">Date</th>
                        <th th:text="#{orders.col.action}">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${data.orders}">
                        <td><strong th:text="'#' + ${o['id']}">1</strong></td>
                        <td th:text="${o['productName']}">Product Name</td>
                        <td th:text="${o['quantity']}">1</td>
                        <td><strong th:text="'₺' + ${o['totalPrice']}">₺0.00</strong></td>
                        <td>
                            <span th:with="s=${o['status']}"
                                  th:class="${s == 'DELIVERED' ? 'badge badge-success' :
                                             s == 'CONFIRMED' || s == 'SHIPPED' ? 'badge badge-info' :
                                             s == 'PENDING' ? 'badge badge-warning' :
                                             s == 'CANCELLED' ? 'badge badge-danger' : 'badge badge-secondary'}"
                                  th:text="${s}">PENDING</span>
                        </td>
                        <td th:text="${#strings.substring(o['createdAt']?.toString(), 0, 16)}">2026-01-01</td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${o['id']})}" class="btn btn-sm btn-secondary"
                               th:text="#{orders.detail.btn}">🔍 Detail</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
