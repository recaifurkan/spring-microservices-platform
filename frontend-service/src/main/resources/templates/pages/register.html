<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{register.title}">Register – ShopMicro</title>
</head>
<body>
<main>
    <div class="container-sm">
        <div class="card">
            <div class="page-header" style="text-align:center;margin-bottom:28px">
                <div style="font-size:2.5rem;margin-bottom:8px">👤</div>
                <h2 style="margin:0 0 6px" th:text="#{register.heading}">Create New Account</h2>
                <p style="color:#666;font-size:0.9rem" th:text="#{register.subtitle}">Join the Microservice Demo platform</p>
            </div>

            <!-- Error message -->
            <div th:if="${data.error}" class="alert alert-danger" style="margin-bottom:16px"
                 th:text="${data.error}"></div>

            <!-- Success message -->
            <div th:if="${data.success}" class="alert alert-success" style="margin-bottom:16px">
                <span th:text="#{register.success}">✅ Your account has been created!</span>
                <a th:href="@{/oauth2/authorization/auth-server}" th:text="#{register.success.login}">Sign In</a>
            </div>

            <form th:if="${data.success == null}" th:action="@{/register}" method="post">

                <div class="form-group">
                    <label for="username">
                        <span th:text="#{register.label.username}">Username</span>
                        <span style="color:#e53935">*</span>
                    </label>
                    <input type="text" id="username" name="username" class="form-group"
                           th:value="${param.username}"
                           th:placeholder="#{register.placeholder.username}"
                           required minlength="3" maxlength="50"
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:1rem">
                    <small style="color:#888" th:text="#{register.hint.username}">At least 3 characters, no spaces</small>
                </div>

                <div class="form-group" style="margin-top:14px">
                    <label for="fullName" th:text="#{register.label.fullName}">Full Name</label>
                    <input type="text" id="fullName" name="fullName" class="form-group"
                           th:value="${param.fullName}"
                           th:placeholder="#{register.placeholder.fullName}"
                           maxlength="100"
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:1rem">
                </div>

                <div class="form-group" style="margin-top:14px">
                    <label for="email" th:text="#{register.label.email}">Email</label>
                    <input type="email" id="email" name="email" class="form-group"
                           th:value="${param.email}"
                           th:placeholder="#{register.placeholder.email}"
                           maxlength="100"
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:1rem">
                </div>

                <div class="form-group" style="margin-top:14px">
                    <label for="password">
                        <span th:text="#{register.label.password}">Password</span>
                        <span style="color:#e53935">*</span>
                    </label>
                    <input type="password" id="password" name="password" class="form-group"
                           th:placeholder="#{register.placeholder.password}"
                           required minlength="6"
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:1rem">
                </div>

                <div class="form-group" style="margin-top:14px">
                    <label for="confirmPassword">
                        <span th:text="#{register.label.confirmPassword}">Confirm Password</span>
                        <span style="color:#e53935">*</span>
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-group"
                           th:placeholder="#{register.placeholder.confirmPassword}"
                           required minlength="6"
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:1rem">
                </div>

                <button type="submit" class="btn btn-primary"
                        style="width:100%;margin-top:20px;padding:12px;font-size:1rem"
                        th:text="#{register.submit}">🚀 Register</button>

                <p style="text-align:center;margin-top:16px;font-size:0.9rem;color:#666">
                    <span th:text="#{register.alreadyHaveAccount}">Already have an account?</span>
                    <a th:href="@{/oauth2/authorization/auth-server}"
                       style="color:#1a237e;font-weight:600"
                       th:text="#{register.login}">Sign In</a>
                </p>
            </form>

            <div th:if="${data.success != null}" style="text-align:center;margin-top:16px">
                <a th:href="@{/oauth2/authorization/auth-server}" class="btn btn-primary"
                   th:text="#{register.login}">🔐 Sign In</a>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Client-side password match check
        const mismatchMsg = /*[[#{register.passwordMismatch}]]*/ 'Passwords do not match!';
        document.querySelector('form')?.addEventListener('submit', function(e) {
            const pw  = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            if (pw !== cpw) {
                e.preventDefault();
                alert(mismatchMsg);
            }
        });
    </script>
</main>
</body>
</html>
