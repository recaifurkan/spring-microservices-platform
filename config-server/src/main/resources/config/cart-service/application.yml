# =============================================
# cart-service-specific config
# Shared settings are inherited from config/application.yml
# =============================================
server:
  port: 8088

spring:
  datasource:
    url: jdbc:h2:file:./data/cartdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
          issuer-uri: http://localhost:9000

# ── Resilience4j – cart-service-specific instances ───────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
          - org.springframework.web.client.ResourceAccessException
    instances:
      product-service:
        base-config: default
  retry:
    instances:
      product-service:
        base-config: default
