# =============================================
# acs-service-specific config
# Shared settings are inherited from config/application.yml
# =============================================
server:
  port: 8089

spring:
  datasource:
    url: jdbc:h2:file:./data/acsdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

